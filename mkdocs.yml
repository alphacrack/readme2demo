site_name: readme2demo
site_description: "Verified tutorials and demo videos from your README. An AI agent runs it in a hardened Docker sandbox and replays it in a fresh container before anything is published."
# Canonical URL for SEO/GEO. Change to your custom domain if you set one up
# (and add a docs/CNAME file with that domain).
site_url: https://alphacrack.github.io/readme2demo/
repo_url: https://github.com/alphacrack/readme2demo
repo_name: alphacrack/readme2demo
edit_uri: edit/main/docs/
copyright: MIT licensed — the CLI and verification pipeline are free and open source.

theme:
  name: material
  features:
    - navigation.instant
    - navigation.tracking
    - navigation.sections
    - navigation.top
    - content.code.copy
    - content.action.edit
    - search.suggest
    - search.highlight
  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: indigo
      accent: indigo
      toggle:
        icon: material/weather-night
        name: Switch to dark mode
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: indigo
      accent: indigo
      toggle:
        icon: material/weather-sunny
        name: Switch to light mode

nav:
  - Home: index.md
  - Usage: usage.md
  - Configuration: configuration.md
  - How it works: how-it-works.md
  - Security model: security.md
  - FAQ: faq.md

# docs/step-by-step.md is a functional guide the self-demo runs against, not a
# site page — keep it in the repo but out of the published site (and out of the
# --strict "not in nav" check). llms.txt is a static file served at the root.
exclude_docs: |
  step-by-step.md

plugins:
  - search
  - minify:
      minify_html: true

markdown_extensions:
  - toc:
      permalink: true
  - admonition
  - pymdownx.highlight
  - pymdownx.superfences
  - pymdownx.details
  - tables

extra:
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/alphacrack/readme2demo
