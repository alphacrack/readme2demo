version: 2
updates:
  # Python dependencies declared in pyproject.toml
  - package-ecosystem: "pip"
    directory: "/"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 5
    labels: ["dependencies"]
    commit-message:
      prefix: "deps"

  # GitHub Actions used by the CI / docs workflows
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
    labels: ["dependencies", "ci"]
    commit-message:
      prefix: "ci"

  # Base sandbox image
  - package-ecosystem: "docker"
    directory: "/images/base"
    schedule:
      interval: "weekly"
    labels: ["dependencies", "docker"]
    commit-message:
      prefix: "docker"
